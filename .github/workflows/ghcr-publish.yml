name: Publish Docker Image

on:
  workflow_run:
    workflows: ["Publish to npm"]
    types:
      - completed

jobs:
  build-amd64:
    if: >
      ${{ github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set version
        id: version
        run: |
          TAG=$(git describe --tags --exact-match ${{ github.event.workflow_run.head_sha }})
          echo "value=${TAG#v}" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          platforms: linux/amd64
          tags: ghcr.io/mobile-next/mobilewright:${{ steps.version.outputs.value }}-amd64
          build-args: MOBILEWRIGHT_VERSION=${{ steps.version.outputs.value }}

  build-arm64:
    if: >
      ${{ github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set version
        id: version
        run: |
          TAG=$(git describe --tags --exact-match ${{ github.event.workflow_run.head_sha }})
          echo "value=${TAG#v}" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          platforms: linux/arm64
          tags: ghcr.io/mobile-next/mobilewright:${{ steps.version.outputs.value }}-arm64
          build-args: MOBILEWRIGHT_VERSION=${{ steps.version.outputs.value }}

  manifest:
    if: >
      ${{ github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-24.04
    needs: [build-amd64, build-arm64]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set version
        id: version
        run: |
          TAG=$(git describe --tags --exact-match ${{ github.event.workflow_run.head_sha }})
          echo "value=${TAG#v}" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - name: Create and push multi-arch manifest
        run: |
          VERSION=${{ steps.version.outputs.value }}
          IMAGE=ghcr.io/mobile-next/mobilewright
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"
      - name: Resolve manifest digest
        id: digest
        run: |
          IMAGE=ghcr.io/mobile-next/mobilewright
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${{ steps.version.outputs.value }}" --format '{{.Manifest.Digest}}')
          echo "value=${DIGEST}" >> $GITHUB_OUTPUT
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/mobile-next/mobilewright
          subject-digest: ${{ steps.digest.outputs.value }}
          push-to-registry: true
