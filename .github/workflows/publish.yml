name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Set version from tag
        run: node utils/set-versions.js ${GITHUB_REF_NAME#v}
      - run: npm ci --ignore-scripts
      - run: npm audit
      - run: npm run build
      - run: npm publish --access public --provenance
        working-directory: packages/protocol
      - run: npm publish --access public --provenance
        working-directory: packages/mobilewright-core
      - run: npm publish --access public --provenance
        working-directory: packages/driver-mobilecli
      - run: npm publish --access public --provenance
        working-directory: packages/driver-mobilenext
      - run: cp ../../README.md .
        working-directory: packages/mobilewright
      - run: npm publish --access public --provenance
        working-directory: packages/mobilewright
      - run: cp ../../README.md .
        working-directory: packages/test
      - run: npm publish --access public --provenance
        working-directory: packages/test
      - name: Create or update GitHub release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -n "/^## \[$VERSION\]/,/^## \[/{ /^## \[$VERSION\]/p; /^## \[/!p; }" CHANGELOG.md > release-notes.md
          if gh release view "$GITHUB_REF_NAME" &>/dev/null; then
            gh release edit "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          fi
        env:
          GH_TOKEN: ${{ github.token }}
